services:
  # Tu aplicación Spring Boot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=jcvjorge
      - DB_PASSWORD=password123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - JWT_SECRET=586E3272357538782F413F4428472B4B6250655368566B597033733676397924423F4528482B4D6251655468576D5A7134743777217A25432A462D4A614E645267556B58703273357638792F423F4528472B4B6250655368566D597133733676397924
      - FIREBASE_CREDENTIALS_PATH=/app/resources/firebase-service-account.json
      - FIREBASE_DATABASE_URL=https://ubicate-4271d-default-rtdb.firebaseio.com
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,http://localhost:8082
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./src/main/resources:/app/resources:ro
    networks:
      - transport-network
    restart: unless-stopped

  # Base de datos MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: auth-jwt
      MYSQL_USER: jcvjorge
      MYSQL_PASSWORD: password123
    ports:
      - "3308:3306"  # ✅ Cambio a puerto 3308
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - transport-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # Redis para comunicación en tiempo real
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - transport-network
    restart: unless-stopped

  # RabbitMQ para mensajes asíncronos e historial GPS
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - transport-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      timeout: 30s
      retries: 3

volumes:
    mysql_data:
      driver: local

networks:
    transport-network:
      driver: bridge