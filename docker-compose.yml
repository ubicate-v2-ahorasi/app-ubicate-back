# ==============================================
# DOCKER COMPOSE para DOCKPLOY
# Incluye: Spring Boot + RabbitMQ
# MySQL y Redis son servicios managed externos
# ==============================================

services:
  # ==========================================
  # SPRING BOOT API
  # ==========================================
  georoute-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: georoute-api:latest
    container_name: georoute-api
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JAVA_OPTS=${JAVA_OPTS}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - georoute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # RABBITMQ (mismo compose, misma red)
  # ==========================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: georoute-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - georoute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

networks:
  georoute-network:
    driver: bridge

volumes:
  rabbitmq_data:
    driver: local